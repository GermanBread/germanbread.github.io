<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>You are being redirected...</title>
    <style>
        body {
            margin: 0;
            
            background-color: #050510;
        }
        body div {
            position: absolute;
            bottom: 40%;
            left: calc(50% - 120px);
        }
        body h1 {
            position: absolute;
            text-align: center;
            top: 40%;
            width: 100%;
            
            font-family: monospace;
            color: white;
            text-shadow: 0 0 2px white;
        }

        loading-thingie {
            width: 40px;
            height: 40px;

            margin-right: 10px;

            animation: loading-blink 2s linear 0s infinite forwards;
        }
        @keyframes loading-blink {
            10% {
                box-shadow: 0 0 5px white;
                background-color: white;
            }
        }
    </style>
    <script>
        window.location.replace("wip.html");
    </script>
  </head>
  <body>
    <h1>You are being redirected</h1>
    <div style="display: flex;">
        <loading-thingie></loading-thingie>
        <loading-thingie style="animation-delay: .2s;"></loading-thingie>
        <loading-thingie style="animation-delay: .4s;"></loading-thingie>
        <loading-thingie style="animation-delay: .6s;"></loading-thingie>
        <loading-thingie style="animation-delay: .8s;"></loading-thingie>
    </div>
  </body>
</html>
