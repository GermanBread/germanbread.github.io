<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>Under construction</title>
    <style>
      body {
        background-color: #050510;
      }
      header .stripes {
        box-shadow: 0 0 5px orange;
        
        background: repeating-linear-gradient(
          45deg,
        #ffae00,
        #ffae00 20px,
        #ff7b00 20px,
        #ff7b00 40px
        );

        background-size: 150%;
        background-position-x: -10px;

        animation: stripes-animate 1s linear infinite;
      }
      @keyframes stripes-animate {
        from {
          background-position-x: -66px;
        }
      }
      .stripes h1 {
        margin: 0;
        padding: 10px;

        font-family: monospace;
        color: white;
        text-shadow: 0 0 5px white;
        text-align: center;
        font-size: 40px;
        font-weight: 700;
      }

      /* message box */
      main {
        justify-content: center;
      }
      .popup-wrapper {
        margin: auto;
        margin-top: 20%;
        width: max-content;
        height: max-content;

        background-color: #112;
        box-shadow: 0px 0px 5px #151530;

        transition: background-color .2s ease, box-shadow .2s ease;
        animation: popup-animate-in 1s ease;
      }
      .popup-wrapper:hover {
        background-color: #151530;
        box-shadow: 0px 0px 5px #224;
      }
      @keyframes popup-animate-in {
        from {
          opacity: 0;
          transform: translateY(50px);
        }
      }
      .popup-wrapper .top-bar {
        height: 4px;
        width: 0;
        
        background-color: #A22;
        box-shadow: 0 0 5px #A22;

        animation: bar-blink 2s ease infinite, bar-animate-in 1s .5s ease forwards;
      }
      @keyframes bar-blink {
        50% {
          background-color: #C22;
          box-shadow: 0 0 5px #C22;
        }
      }
      @keyframes bar-animate-in {
        to {
          width: 100%;
        }
      }
      
      .popup-content {
        border: 2px #151530 solid;
        border-top: none;

        padding: 20px;
      }
      .popup-content h1 {
        margin-top: 0;
        padding: 10px;

        font-family: monospace;
        color: white;
        text-shadow: 0 0 2px white;
        text-align: center;
        font-size: 30px;
        font-weight: 700;
      }
      .popup-content p {
        padding: 5px;

        font-family: monospace;
        color: white;
        text-shadow: 0 0 1px white;
        font-size: 15px;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <header><div class="stripes"><h1>Warning</h1></div></header>
    <main>
      <div class="popup-wrapper">
        <div class="top-bar"></div>
        <div class="popup-content">
          <h1>This homepage is currently under heavy development</h1>
          <p>Check back in a day or two</p>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
